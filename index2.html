<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Buscador de PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            height: fit-content;
        }
        .chat-main {
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .user {
            background: #2c3e76;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .bot {
            background: #e9ecef;
            color: #1e2a3e;
        }
        .bot strong {
            color: #2c3e76;
        }
        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            border-top: 1px solid #ddd;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 1rem;
        }
        button {
            background: #2c3e76;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
        .metrics {
            background: #f8f9fa;
            padding: 10px 20px;
            font-size: 0.85rem;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }
        .file-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }
        .extract-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>📄 Cargar PDF</h3>
            <input type="file" id="pdfUpload" accept=".pdf">
            <div class="file-info" id="pdfStatus">⚠️ Ningún PDF cargado</div>

            <div class="extract-box" id="extractBox">
                <strong>📖 Vista previa del texto extraído:</strong>
                <div id="extractedPreview" style="margin-top:5px; color:#555;"></div>
            </div>

            <hr>
            <h4>📊 Métricas</h4>
            <p>💬 Preguntas: <strong id="questionCount">0</strong></p>
            <p>⏱️ Tiempo: <strong id="timer">00:00</strong></p>

            <button id="clearChat" style="background:#6c757d; margin-top:10px;">Limpiar chat</button>
        </div>

        <div class="chat-main">
            <div class="chat-area" id="chatArea">
                <div class="message bot">🤖 Sube un PDF y hazme preguntas. ¡Responderé con citas textuales del documento!</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ej: ¿Qué dice sobre la adultez emergente?">
                <button id="sendBtn">Enviar</button>
            </div>
            <div class="metrics">
                <span>📌 Última pregunta: <span id="lastQuestion">—</span></span>
                <span id="pageInfo">📄 Páginas: 0</span>
            </div>
        </div>
    </div>

    <script>
        // ================== ELEMENTOS ==================
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearChatBtn = document.getElementById('clearChat');
        const pdfUpload = document.getElementById('pdfUpload');
        const pdfStatus = document.getElementById('pdfStatus');
        const extractBox = document.getElementById('extractBox');
        const extractedPreview = document.getElementById('extractedPreview');
        const pageInfo = document.getElementById('pageInfo');

        let pdfText = "";
        let pdfTextLimpio = "";   // texto normalizado para mostrar y buscar
        let pdfPages = 0;
        let pdfName = "";
        let questionCounter = 0;
        let timerSeconds = 0;
        let timerInterval = null;

        // ================== TEMPORIZADOR ==================
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds++;
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                document.getElementById('timer').textContent =
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }
        startTimer();

        // ================== UTILIDADES ==================
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Normalizar texto para comparaciones (quita acentos)
        function normalizeForCompare(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        // ================== LIMPIEZA AVANZADA DE TEXTO ==================
        function limpiarTexto(texto) {
            // 1. Normalizar a NFC para combinar caracteres base + acentos
            let limpio = texto.normalize('NFC');

            // 2. Reemplazar secuencias de caracteres rotos comunes (ej: "i ´" → "í")
            //    Patrón: letra + espacio + acento (´, `, ^, etc.) o viceversa
            limpio = limpio.replace(/([aeiou])\s+[´']/gi, '$1´');  // "a ´" → "a´"
            limpio = limpio.replace(/[´']\s+([aeiou])/gi, '´$1');  // "´ a" → "´a"
            // Unir el acento con la vocal (convertir a forma compuesta)
            limpio = limpio.normalize('NFC');

            // 3. Reemplazar caracteres de control y espacios extraños
            limpio = limpio.replace(/[\u0000-\u001F\u007F-\u009F]/g, ' ');

            // 4. Quitar espacios múltiples
            limpio = limpio.replace(/\s+/g, ' ').trim();

            // 5. (Opcional) Reemplazar "í" literal si aparece como "i" + combinación
            //    Ya lo cubre normalize('NFC')

            return limpio;
        }

        // ================== LECTURA DEL PDF ==================
        async function leerPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let textoCompleto = "";
            pdfPages = pdf.numPages;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                // Extraer texto plano
                let pageText = textContent.items.map(item => item.str).join(' ');
                // Limpiar espacios y caracteres raros
                pageText = pageText.replace(/\s+/g, ' ').trim();
                textoCompleto += pageText + "\n";
            }

            // Aplicar limpieza profunda
            const textoLimpio = limpiarTexto(textoCompleto);
            return textoLimpio;
        }

        // ================== MOTOR DE BÚSQUEDA ==================
        function buscarEnPDF(pregunta) {
            if (!pdfTextLimpio || pdfTextLimpio.length < 50) {
                return "⚠️ Primero carga un PDF válido con texto extraíble.";
            }

            // Extraer palabras clave (descartar stopwords)
            const stopWords = ['el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas', 'de', 'del', 'en', 'para', 'por', 'con',
                'sin', 'sobre', 'entre', 'hasta', 'desde', 'según', 'durante', 'mediante', 'qué', 'cómo', 'cuál', 'cuáles',
                'quién', 'quienes', 'dónde', 'cuándo', 'por qué', 'para qué', 'es', 'son', 'está', 'están'
            ];
            const palabras = pregunta.toLowerCase().split(/\s+/)
                .map(p => p.replace(/[.,;:!?¿¡()"']/g, ''))
                .filter(p => p.length > 2 && !stopWords.includes(p));

            if (palabras.length === 0) {
                return "📖 No pude identificar palabras clave en tu pregunta. Intenta reformularla.";
            }

            // Dividir en oraciones (por puntos, signos de interrogación/exclamación)
            const oraciones = pdfTextLimpio.split(/[.!?;]+/).map(o => o.trim()).filter(o => o.length > 20);

            // Calcular puntaje
            const puntajes = oraciones.map(oracion => {
                const lower = oracion.toLowerCase();
                // Normalizar sin acentos para la comparación
                const normOracion = normalizeForCompare(lower);
                const normPalabras = palabras.map(p => normalizeForCompare(p));

                let puntaje = 0;
                for (let pal of normPalabras) {
                    if (normOracion.includes(pal)) {
                        puntaje += 2;
                    }
                }
                // Bonus si aparecen varias palabras juntas
                const count = normPalabras.filter(p => normOracion.includes(p)).length;
                if (count > 1) puntaje += count * 2;

                return { texto: oracion, puntaje };
            });

            puntajes.sort((a, b) => b.puntaje - a.puntaje);
            const mejores = puntajes.filter(p => p.puntaje > 0);

            if (mejores.length === 0) {
                return "📖 No encontré información relevante en el PDF para tu pregunta.\n\n💡 Intenta usar palabras clave más concretas.";
            }

            // Construir respuesta con hasta 3 fragmentos
            let respuesta = "📄 **Fragmentos encontrados en el PDF:**\n\n";
            const maxFragmentos = Math.min(3, mejores.length);
            for (let i = 0; i < maxFragmentos; i++) {
                let texto = mejores[i].texto;
                if (texto.length > 700) texto = texto.substring(0, 700) + '...';
                respuesta += `📌 ${texto}.\n\n`;
            }
            respuesta += "💡 *Estas son citas textuales extraídas del documento.*";

            return respuesta;
        }

        // ================== MANEJO DE CARGA DE PDF ==================
        pdfUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            pdfName = file.name;
            pdfStatus.innerHTML = "⏳ Leyendo PDF...";

            try {
                pdfTextLimpio = await leerPDF(file);

                if (pdfTextLimpio.length < 100) {
                    throw new Error("El PDF parece estar escaneado o no tiene texto extraíble.");
                }

                // Mostrar vista previa
                extractBox.style.display = 'block';
                const preview = pdfTextLimpio.substring(0, 400) + (pdfTextLimpio.length > 400 ? '...' : '');
                extractedPreview.textContent = preview;

                pageInfo.textContent = `📄 Páginas: ${pdfPages}`;
                pdfStatus.innerHTML = `✅ <strong>${file.name}</strong><br>📄 ${pdfPages} páginas, ${Math.round(pdfTextLimpio.length/1000)} KB`;

                addMessage(`📚 PDF cargado correctamente: "${file.name}"\n📄 ${pdfPages} páginas extraídas.\n\n💬 ¡Pregúntame sobre cualquier tema que aparece en el documento!`, 'bot');

            } catch (error) {
                console.error(error);
                pdfStatus.innerHTML = `❌ Error: ${error.message}`;
                addMessage(`❌ Error al leer el PDF: ${error.message}`, 'bot');
                pdfTextLimpio = "";
            }
        });

        // ================== PROCESAR PREGUNTA ==================
        function handleQuestion() {
            const question = userInput.value.trim();
            if (!question) return;

            questionCounter++;
            document.getElementById('questionCount').textContent = questionCounter;
            const shortQ = question.length > 40 ? question.substring(0, 40) + '...' : question;
            document.getElementById('lastQuestion').textContent = shortQ;

            addMessage(question, 'user');

            const respuesta = buscarEnPDF(question);
            addMessage(respuesta, 'bot');

            userInput.value = "";
        }

        function clearChat() {
            chatArea.innerHTML = '';
            addMessage("🧹 Chat limpiado. ¡Sigue preguntando sobre el PDF!", 'bot');
        }

        // ================== EVENTOS ==================
        sendBtn.addEventListener('click', handleQuestion);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleQuestion();
        });
        clearChatBtn.addEventListener('click', clearChat);
    </script>
</body>
</html>
