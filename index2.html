<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot con PDF Local</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            height: fit-content;
        }
        .chat-main {
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
        }
        .user {
            background: #2c3e76;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .bot {
            background: #e9ecef;
            color: #1e2a3e;
        }
        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            border-top: 1px solid #ddd;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
        }
        button {
            background: #2c3e76;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
        }
        .metrics {
            background: #f8f9fa;
            padding: 10px 20px;
            font-size: 0.85rem;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }
        .file-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }
        .extract-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: none;
        }
        .highlight {
            background: #fff3cd;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .tag {
            display: inline-block;
            background: #2c3e76;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>📄 Cargar PDF</h3>
        <input type="file" id="pdfUpload" accept=".pdf">
        <div class="file-info" id="pdfStatus">⚠️ Ningún PDF cargado</div>
        
        <div class="extract-box" id="extractBox">
            <strong>📖 Texto extraído (primeros 500 caracteres):</strong>
            <div id="extractedPreview"></div>
        </div>
        
        <hr>
        <h4>📊 Métricas del estudio</h4>
        <p>💬 Preguntas: <strong id="questionCount">0</strong></p>
        <p>⏱️ Tiempo: <strong id="timer">00:00</strong></p>
        
        <button id="clearChat" style="background:#6c757d; margin-top:10px;">Limpiar chat</button>
    </div>
    
    <div class="chat-main">
        <div class="chat-area" id="chatArea">
            <div class="message bot">🤖 Sube un PDF y luego hazme preguntas sobre su contenido. Responderé usando SOLO ese documento.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Pregunta sobre el PDF...">
            <button id="sendBtn">Enviar</button>
        </div>
        <div class="metrics">
            <span>📌 Última pregunta: <span id="lastQuestion">—</span></span>
            <span id="pageInfo">📄 Páginas: 0</span>
        </div>
    </div>
</div>

<script>
    let pdfText = "";
    let pdfPages = 0;
    let pdfName = "";
    let questionCounter = 0;
    let timerSeconds = 0;
    let timerInterval = null;
    
    // Elementos
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChat');
    const pdfUpload = document.getElementById('pdfUpload');
    const pdfStatus = document.getElementById('pdfStatus');
    const extractBox = document.getElementById('extractBox');
    const extractedPreview = document.getElementById('extractedPreview');
    const pageInfo = document.getElementById('pageInfo');
    
    // Temporizador
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            document.getElementById('timer').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }
    startTimer();
    
    // Agregar mensaje al chat
    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.textContent = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    // Función mejorada para buscar en el PDF
    function buscarEnPDF(pregunta) {
        if (!pdfText || pdfText.length < 10) {
            return "⚠️ Primero carga un PDF con texto válido. Asegúrate de que el PDF no sea solo imágenes escaneadas.";
        }
        
        // Mostrar estadísticas del texto para depuración
        console.log(`📊 Texto extraído: ${pdfText.length} caracteres, ${pdfText.split(/\s+/).length} palabras`);
        
        // Limpiar y preparar la pregunta
        const palabrasClave = pregunta.toLowerCase()
            .replace(/[¿?¡!.,;:()]/g, '')
            .split(/\s+/)
            .filter(p => p.length > 3);
        
        if (palabrasClave.length === 0) {
            return "📖 Por favor, formula una pregunta más específica con palabras clave.";
        }
        
        // Dividir el PDF en secciones (párrafos)
        const secciones = pdfText.split(/\n\s*\n/);
        let mejoresRespuestas = [];
        
        for (let seccion of secciones) {
            seccion = seccion.trim();
            if (seccion.length < 20) continue;
            
            let puntaje = 0;
            for (let palabra of palabrasClave) {
                // Búsqueda exacta y con variantes
                if (seccion.toLowerCase().includes(palabra)) {
                    puntaje += 2;
                }
                // Búsqueda de palabras relacionadas (sin acentos)
                const palabraSinAcento = palabra.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (seccion.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(palabraSinAcento)) {
                    puntaje += 1;
                }
            }
            
            // Bonus si la sección contiene varias palabras clave
            if (puntaje > 0) {
                // Limpiar el texto de caracteres extraños
                let textoLimpio = seccion.replace(/[-ÿ]/g, ' ').replace(/\s+/g, ' ');
                mejoresRespuestas.push({ 
                    texto: textoLimpio, 
                    puntaje: puntaje,
                    palabrasEncontradas: palabrasClave.filter(p => seccion.toLowerCase().includes(p)).length
                });
            }
        }
        
        // Ordenar por relevancia
        mejoresRespuestas.sort((a, b) => b.puntaje - a.puntaje);
        
        if (mejoresRespuestas.length === 0) {
            return "📖 No encontré información específica en el PDF sobre eso. El texto del PDF parece ser:\n\n" + 
                   pdfText.substring(0, 300) + "...\n\n💡 Intenta preguntar sobre conceptos como: personalidad, teoría, Freud, psicología, etc.";
        }
        
        // Construir respuesta con los fragmentos más relevantes
        let respuesta = "📄 **Según el PDF:**\n\n";
        const maxFragmentos = Math.min(3, mejoresRespuestas.length);
        
        for (let i = 0; i < maxFragmentos; i++) {
            const frag = mejoresRespuestas[i];
            // Truncar si es muy largo
            let texto = frag.texto;
            if (texto.length > 400) {
                texto = texto.substring(0, 400) + "...";
            }
            respuesta += `📌 *Fragmento ${i+1}:*\n${texto}\n\n`;
        }
        
        respuesta += "\n💡 *Nota: El chatbot extrae fragmentos textuales del PDF. La precisión depende de la calidad del texto extraído.*";
        
        return respuesta;
    }
    
    // Leer PDF con pdf.js mejorado
    async function leerPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let textoCompleto = "";
        pdfPages = pdf.numPages;
        
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            
            // Extraer texto con metadatos de posición para preservar estructura
            let pageText = "";
            let lastY = null;
            let currentLine = "";
            
            // Ordenar items por posición Y (vertical) para mantener el orden de lectura
            const items = textContent.items.sort((a, b) => a.transform[5] - b.transform[5]);
            
            for (let item of items) {
                const str = item.str.trim();
                if (!str) continue;
                
                const y = item.transform[5];
                if (lastY !== null && Math.abs(y - lastY) > 5) {
                    // Cambio de línea
                    if (currentLine) {
                        pageText += currentLine + "\n";
                        currentLine = "";
                    }
                }
                currentLine += str + " ";
                lastY = y;
            }
            if (currentLine) {
                pageText += currentLine + "\n";
            }
            
            // Limpiar caracteres extraños
            pageText = pageText.replace(/[-ÿ]/g, ' ').replace(/\s+/g, ' ');
            
            // Agregar separador de página
            textoCompleto += `=== PÁGINA ${i} ===\n${pageText}\n\n`;
        }
        
        // Limpieza final
        textoCompleto = textoCompleto.replace(/[^\w\s\.,;:!?¡¿()\-áéíóúñÑÁÉÍÓÚ]/g, ' ').replace(/\s+/g, ' ');
        
        return textoCompleto;
    }
    
    // Manejar carga de PDF
    pdfUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        pdfName = file.name;
        pdfStatus.innerHTML = "⏳ Leyendo PDF... Esto puede tomar unos segundos...";
        
        try {
            pdfText = await leerPDF(file);
            
            if (pdfText.length < 100) {
                throw new Error("El PDF parece estar escaneado o no contiene texto extraíble.");
            }
            
            // Mostrar vista previa del texto extraído
            extractBox.style.display = 'block';
            const preview = pdfText.substring(0, 500) + (pdfText.length > 500 ? '...' : '');
            extractedPreview.textContent = preview;
            
            pageInfo.textContent = `📄 Páginas: ${pdfPages}`;
            
            // Mostrar estadísticas del texto
            const palabras = pdfText.split(/\s+/).length;
            pdfStatus.innerHTML = `✅ <strong>PDF cargado:</strong> ${file.name}<br>📄 ${pdfPages} páginas, ${Math.round(pdfText.length/1000)} KB, ${palabras} palabras`;
            
            addMessage(`📚 PDF "${file.name}" cargado exitosamente.\n📄 ${pdfPages} páginas extraídas.\n💬 ¡Puedes preguntarme sobre su contenido!`, 'bot');
            
        } catch (error) {
            console.error(error);
            pdfStatus.innerHTML = `❌ Error al leer el PDF: ${error.message}`;
            addMessage(`❌ No pude leer el PDF correctamente. ${error.message}\n\nSugerencia: Asegúrate de que sea un PDF con texto (no escaneado) y que no esté dañado.`, 'bot');
            pdfText = "";
        }
    });
    
    // Procesar pregunta
    function handleQuestion() {
        const question = userInput.value.trim();
        if (!question) return;
        
        // Actualizar métricas
        questionCounter++;
        document.getElementById('questionCount').textContent = questionCounter;
        document.getElementById('lastQuestion').textContent = question.substring(0, 40) + (question.length > 40 ? '...' : '');
        
        // Mostrar pregunta
        addMessage(question, 'user');
        
        // Obtener respuesta del PDF
        const respuesta = buscarEnPDF(question);
        addMessage(respuesta, 'bot');
        
        // Limpiar input
        userInput.value = "";
        
        // Guardar en consola para evidencias
        console.log(`[${new Date().toLocaleTimeString()}] Pregunta #${questionCounter}: "${question}"`);
    }
    
    // Limpiar chat
    function clearChat() {
        chatArea.innerHTML = '';
        addMessage("🧹 Chat limpiado. Puedes seguir preguntando sobre el PDF.", 'bot');
    }
    
    // Eventos
    sendBtn.addEventListener('click', handleQuestion);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleQuestion();
    });
    clearChatBtn.addEventListener('click', clearChat);
</script>
</body>
</html>
