<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Teorías de la Personalidad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            height: fit-content;
        }
        .chat-main {
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .user {
            background: #2c3e76;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .bot {
            background: #e9ecef;
            color: #1e2a3e;
        }
        .bot strong { color: #2c3e76; }
        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            border-top: 1px solid #ddd;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 1rem;
        }
        button {
            background: #2c3e76;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
        .metrics {
            background: #f8f9fa;
            padding: 10px 20px;
            font-size: 0.85rem;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }
        .file-info {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }
        .extract-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: none;
        }
        .badge {
            display: inline-block;
            background: #28a745;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>📄 Cargar PDF</h3>
        <input type="file" id="pdfUpload" accept=".pdf">
        <div class="file-info" id="pdfStatus">⚠️ Ningún PDF cargado</div>
        
        <div class="extract-box" id="extractBox">
            <strong>📖 Vista previa del texto extraído:</strong>
            <div id="extractedPreview" style="margin-top:5px; color:#555;"></div>
        </div>
        
        <hr>
        <h4>📊 Métricas</h4>
        <p>💬 Preguntas: <strong id="questionCount">0</strong></p>
        <p>⏱️ Tiempo: <strong id="timer">00:00</strong></p>
        
        <button id="clearChat" style="background:#6c757d; margin-top:10px;">Limpiar chat</button>
    </div>
    
    <div class="chat-main">
        <div class="chat-area" id="chatArea">
            <div class="message bot">🤖 Sube el PDF de <strong>Teorías de la personalidad - Jess Feist</strong> y hazme preguntas. ¡Responderé con citas exactas del libro!</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ej: ¿Qué es la personalidad?">
            <button id="sendBtn">Enviar</button>
        </div>
        <div class="metrics">
            <span>📌 Última pregunta: <span id="lastQuestion">—</span></span>
            <span id="pageInfo">📄 Páginas: 0</span>
        </div>
    </div>
</div>

<script>
    let pdfText = "";
    let pdfPages = 0;
    let pdfName = "";
    let questionCounter = 0;
    let timerSeconds = 0;
    let timerInterval = null;
    let frasesClave = {};
    
    // Elementos
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChat');
    const pdfUpload = document.getElementById('pdfUpload');
    const pdfStatus = document.getElementById('pdfStatus');
    const extractBox = document.getElementById('extractBox');
    const extractedPreview = document.getElementById('extractedPreview');
    const pageInfo = document.getElementById('pageInfo');
    
    // Temporizador
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            document.getElementById('timer').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }
    startTimer();
    
    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.textContent = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    // ============ MOTOR DE BÚSQUEDA AVANZADO ============
    function buscarEnPDF(pregunta) {
        if (!pdfText || pdfText.length < 50) {
            return "⚠️ Primero carga el PDF. Asegúrate de que sea el libro de Feist y que tenga texto extraíble.";
        }
        
        const p = pregunta.toLowerCase().trim();
        
        // === DICCIONARIO DE TEMAS Y SUS DEFINICIONES ===
        const temas = {
            'personalidad': {
                palabras: ['personalidad', 'persona', 'máscara', 'rasgos', 'características'],
                respuesta: function(texto) {
                    // Buscar la definición exacta en el texto
                    const regex = /personalidad\s+es\s+un\s+patrón\s+de\s+rasgos[^.!?]*[.!?]/i;
                    const match = texto.match(regex);
                    if (match) return match[0];
                    
                    // Buscar fragmento que hable de la definición
                    const partes = texto.split(/[.!?]+/);
                    for (let parte of partes) {
                        if (parte.toLowerCase().includes('personalidad') && 
                            (parte.toLowerCase().includes('patrón') || 
                             parte.toLowerCase().includes('rasgos') ||
                             parte.toLowerCase().includes('coherencia') ||
                             parte.toLowerCase().includes('individualidad'))) {
                            return parte.trim() + '.';
                        }
                    }
                    return null;
                }
            },
            'teoría': {
                palabras: ['teoría', 'científica', 'supuestos', 'hipótesis', 'deductivo'],
                respuesta: function(texto) {
                    const partes = texto.split(/[.!?]+/);
                    for (let parte of partes) {
                        if (parte.toLowerCase().includes('teoría') && 
                            (parte.toLowerCase().includes('científica') || 
                             parte.toLowerCase().includes('supuestos') ||
                             parte.toLowerCase().includes('hipótesis'))) {
                            return parte.trim() + '.';
                        }
                    }
                    return null;
                }
            },
            'freud': {
                palabras: ['freud', 'sigmund', 'psicoanálisis', 'inconsciente', 'neurólogo'],
                respuesta: function(texto) {
                    const partes = texto.split(/[.!?]+/);
                    for (let parte of partes) {
                        if (parte.toLowerCase().includes('freud') || 
                            parte.toLowerCase().includes('sigmund')) {
                            return parte.trim() + '.';
                        }
                    }
                    return null;
                }
            },
            'criterios': {
                palabras: ['criterios', 'útil', 'genera', 'refutable', 'organiza', 'guía', 'coherencia', 'sencilla'],
                respuesta: function(texto) {
                    const partes = texto.split(/[.!?]+/);
                    let respuestas = [];
                    for (let parte of partes) {
                        if (parte.toLowerCase().includes('criterio') || 
                            parte.toLowerCase().includes('genera investigación') ||
                            parte.toLowerCase().includes('refutable')) {
                            respuestas.push(parte.trim());
                        }
                    }
                    return respuestas.length > 0 ? respuestas.slice(0, 3).join('. ') + '.' : null;
                }
            },
            'determinismo': {
                palabras: ['determinismo', 'libertad', 'elección', 'control', 'fuerzas'],
                respuesta: function(texto) {
                    const partes = texto.split(/[.!?]+/);
                    for (let parte of partes) {
                        if (parte.toLowerCase().includes('determinismo') || 
                            parte.toLowerCase().includes('libertad de elección')) {
                            return parte.trim() + '.';
                        }
                    }
                    return null;
                }
            }
        };
        
        // Detectar qué tema está preguntando
        let temaDetectado = null;
        let maxCoincidencias = 0;
        
        for (let [tema, data] of Object.entries(temas)) {
            let coincidencias = 0;
            for (let palabra of data.palabras) {
                if (p.includes(palabra)) coincidencias++;
            }
            if (coincidencias > maxCoincidencias && coincidencias > 0) {
                maxCoincidencias = coincidencias;
                temaDetectado = tema;
            }
        }
        
        // Si detectó un tema, buscar su definición
        if (temaDetectado) {
            const tema = temas[temaDetectado];
            const respuesta = tema.respuesta(pdfText);
            if (respuesta) {
                return `📖 **Según el libro de Feist (Capítulo 1):**\n\n${respuesta}\n\n💡 *Esta es una cita textual extraída del PDF.*`;
            }
        }
        
        // === BÚSQUEDA POR PALABRAS CLAVE (FALLBACK) ===
        const palabrasClave = p.split(/\s+/).filter(palabra => palabra.length > 3);
        
        // Dividir en oraciones
        const oraciones = pdfText.split(/[.!?]+/);
        let mejores = [];
        
        for (let oracion of oraciones) {
            oracion = oracion.trim();
            if (oracion.length < 20) continue;
            
            let puntaje = 0;
            for (let palabra of palabrasClave) {
                if (oracion.toLowerCase().includes(palabra)) {
                    puntaje += 2;
                }
            }
            if (puntaje > 0) {
                mejores.push({ texto: oracion, puntaje: puntaje });
            }
        }
        
        mejores.sort((a, b) => b.puntaje - a.puntaje);
        
        if (mejores.length === 0) {
            return "📖 No encontré información específica sobre eso en el PDF.\n\n💡 Prueba preguntar sobre: **personalidad**, **teoría**, **Freud**, **criterios** o **determinismo**.";
        }
        
        // Construir respuesta con los fragmentos más relevantes
        let respuesta = "📄 **Fragmentos encontrados en el PDF:**\n\n";
        for (let i = 0; i < Math.min(2, mejores.length); i++) {
            let texto = mejores[i].texto;
            if (texto.length > 500) texto = texto.substring(0, 500) + '...';
            respuesta += `📌 ${texto}.\n\n`;
        }
        respuesta += "💡 *Recuerda: el chatbot busca textualmente en el documento.*";
        
        return respuesta;
    }
    
    // Leer PDF con pdf.js mejorado
    async function leerPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let textoCompleto = "";
        pdfPages = pdf.numPages;
        
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            
            let pageText = "";
            let lastY = null;
            let currentLine = "";
            
            const items = textContent.items.sort((a, b) => a.transform[5] - b.transform[5]);
            
            for (let item of items) {
                const str = item.str.trim();
                if (!str) continue;
                
                const y = item.transform[5];
                if (lastY !== null && Math.abs(y - lastY) > 8) {
                    if (currentLine) {
                        pageText += currentLine + "\n";
                        currentLine = "";
                    }
                }
                currentLine += str + " ";
                lastY = y;
            }
            if (currentLine) {
                pageText += currentLine + "\n";
            }
            
            // Limpiar caracteres extraños
            pageText = pageText.replace(/[-ÿ]/g, ' ').replace(/\s+/g, ' ');
            textoCompleto += pageText + "\n";
        }
        
        return textoCompleto;
    }
    
    // Manejar carga de PDF
    pdfUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        pdfName = file.name;
        pdfStatus.innerHTML = "⏳ Leyendo PDF...";
        
        try {
            pdfText = await leerPDF(file);
            
            if (pdfText.length < 100) {
                throw new Error("El PDF parece estar escaneado. Solo funcionan PDFs con texto.");
            }
            
            // Mostrar vista previa
            extractBox.style.display = 'block';
            extractedPreview.textContent = pdfText.substring(0, 400) + (pdfText.length > 400 ? '...' : '');
            
            pageInfo.textContent = `📄 Páginas: ${pdfPages}`;
            pdfStatus.innerHTML = `✅ <strong>${file.name}</strong><br>📄 ${pdfPages} páginas, ${Math.round(pdfText.length/1000)} KB`;
            
            addMessage(`📚 PDF cargado correctamente: "${file.name}"\n📄 ${pdfPages} páginas extraídas.\n\n💬 ¡Pregúntame sobre **personalidad**, **teoría**, **Freud** o cualquier concepto del libro!`, 'bot');
            
        } catch (error) {
            console.error(error);
            pdfStatus.innerHTML = `❌ Error: ${error.message}`;
            addMessage(`❌ Error al leer el PDF: ${error.message}`, 'bot');
            pdfText = "";
        }
    });
    
    // Procesar pregunta
    function handleQuestion() {
        const question = userInput.value.trim();
        if (!question) return;
        
        questionCounter++;
        document.getElementById('questionCount').textContent = questionCounter;
        document.getElementById('lastQuestion').textContent = question.substring(0, 40) + (question.length > 40 ? '...' : '');
        
        addMessage(question, 'user');
        
        const respuesta = buscarEnPDF(question);
        addMessage(respuesta, 'bot');
        
        userInput.value = "";
    }
    
    function clearChat() {
        chatArea.innerHTML = '';
        addMessage("🧹 Chat limpiado. ¡Sigue preguntando sobre el libro!", 'bot');
    }
    
    sendBtn.addEventListener('click', handleQuestion);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleQuestion();
    });
    clearChatBtn.addEventListener('click', clearChat);
</script>
</body>
</html>
